<svg viewBox="0 0 820 880" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>NLPTrader system architecture</title>
<desc>Vertical pipeline: news ingestion to NLP processing to LLM reasoning to signal engine to API to dashboard, with a database and an external LLM API connected to the side.</desc>
<style>
  .core{fill:#e8eefc;stroke:#3b6fd6;}
  .support{fill:#eef1f4;stroke:#8a94a3;}
  .ext{fill:#fdf2e6;stroke:#d08a32;}
  .lbl{fill:#1f2733;font-size:17px;font-weight:600;}
  .sub{fill:#566072;font-size:12.5px;}
  .tag{fill:#3b6fd6;font-size:11px;font-weight:700;letter-spacing:.5px;}
  .flow{stroke:#3b6fd6;stroke-width:2;fill:none;}
  .side{stroke:#8a94a3;stroke-width:2;stroke-dasharray:5 4;fill:none;}
  .title{fill:#1f2733;font-size:22px;font-weight:700;}
  .leg{fill:#566072;font-size:12px;}
  @media (prefers-color-scheme: dark){
    .core{fill:#1e2a44;stroke:#5b8def;}
    .support{fill:#232a33;stroke:#9aa4b2;}
    .ext{fill:#3a2c1a;stroke:#e0a458;}
    .lbl{fill:#e8edf4;} .sub{fill:#aab3c2;} .title{fill:#e8edf4;}
    .tag{fill:#7aa5f5;} .flow{stroke:#5b8def;} .side{stroke:#9aa4b2;} .leg{fill:#aab3c2;}
  }
  text{font-family:ui-sans-serif,system-ui,sans-serif;}
</style>
<text x="410" y="38" text-anchor="middle" class="title">NLPTrader — System Architecture (MVP)</text>
<rect x="250" y="54" width="12" height="12" rx="2" class="core"/><text x="268" y="64" class="leg">Core pipeline</text>
<rect x="380" y="54" width="12" height="12" rx="2" class="support"/><text x="398" y="64" class="leg">Support</text>
<rect x="470" y="54" width="12" height="12" rx="2" class="ext"/><text x="488" y="64" class="leg">External service</text>
<rect x="260" y="86" width="300" height="74" rx="10" class="core"/>
<text x="282" y="112" class="tag">1 · DATA INGESTION</text>
<text x="282" y="134" class="lbl">News &amp; Text Collector</text>
<text x="282" y="152" class="sub">News APIs · RSS feeds → structured items</text>
<path class="flow" d="M410 160 L410 196" marker-end="url(#arr)"/>
<rect x="260" y="196" width="300" height="74" rx="10" class="core"/>
<text x="282" y="222" class="tag">2 · NLP PROCESSING</text>
<text x="282" y="244" class="lbl">FinBERT + Event Tagging</text>
<text x="282" y="262" class="sub">Sentiment · event class · entity extraction</text>
<path class="flow" d="M410 270 L410 306" marker-end="url(#arr)"/>
<rect x="260" y="306" width="300" height="74" rx="10" class="core"/>
<text x="282" y="332" class="tag">3 · LLM REASONING</text>
<text x="282" y="354" class="lbl">Impact &amp; Rationale Engine</text>
<text x="282" y="372" class="sub">Interprets event impact + context</text>
<rect x="612" y="306" width="170" height="74" rx="10" class="ext"/>
<text x="628" y="332" class="tag" fill="#d08a32">EXTERNAL</text>
<text x="628" y="354" class="lbl">LLM API</text>
<text x="628" y="372" class="sub">OpenAI / Claude</text>
<path class="side" d="M560 343 L612 343" marker-end="url(#arrg)"/>
<path class="side" d="M612 360 L560 360" marker-end="url(#arrg)"/>
<path class="flow" d="M410 380 L410 416" marker-end="url(#arr)"/>
<rect x="260" y="416" width="300" height="86" rx="10" class="core"/>
<text x="282" y="442" class="tag">4 · SIGNAL ENGINE</text>
<text x="282" y="464" class="lbl">Rules + LLM Hybrid</text>
<text x="282" y="482" class="sub">BUY / HOLD / SELL · confidence 0–100</text>
<text x="282" y="498" class="sub">· text-grounded explanation</text>
<rect x="38" y="300" width="170" height="210" rx="10" class="support"/>
<text x="54" y="326" class="tag" fill="#8a94a3">STORAGE</text>
<text x="54" y="348" class="lbl">Database</text>
<text x="54" y="368" class="sub">SQLite / Postgres</text>
<text x="54" y="392" class="sub">Stores:</text>
<text x="54" y="412" class="sub">· raw news</text>
<text x="54" y="430" class="sub">· NLP outputs</text>
<text x="54" y="448" class="sub">· signals + scores</text>
<text x="54" y="466" class="sub">· explanations</text>
<path class="side" d="M260 233 C150 233 208 300 208 320"/>
<path class="side" d="M260 459 L208 459" marker-end="url(#arrg)"/>
<path class="flow" d="M410 502 L410 538" marker-end="url(#arr)"/>
<rect x="260" y="538" width="300" height="74" rx="10" class="support"/>
<text x="282" y="564" class="tag" fill="#8a94a3">5 · API LAYER</text>
<text x="282" y="586" class="lbl">FastAPI Backend</text>
<text x="282" y="604" class="sub">Serves signals &amp; news to the frontend</text>
<path class="flow" d="M410 612 L410 648" marker-end="url(#arr)"/>
<rect x="260" y="648" width="300" height="74" rx="10" class="support"/>
<text x="282" y="674" class="tag" fill="#8a94a3">6 · FRONTEND</text>
<text x="282" y="696" class="lbl">Dashboard (Streamlit/React)</text>
<text x="282" y="714" class="sub">News · signals · confidence · reasoning</text>
<path class="flow" d="M410 722 L410 758" marker-end="url(#arr)"/>
<rect x="300" y="758" width="220" height="58" rx="29" class="core"/>
<text x="410" y="786" text-anchor="middle" class="lbl">User</text>
<text x="410" y="804" text-anchor="middle" class="sub">reviews signals (no auto-trading)</text>
<text x="410" y="852" text-anchor="middle" class="leg">Decision-support only · MVP excludes price prediction, HFT &amp; broker execution</text>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#3b6fd6"/></marker>
  <marker id="arrg" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#8a94a3"/></marker>
</defs>
</svg>