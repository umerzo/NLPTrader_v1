  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

erTitle }}<\/div>\n        <div style=\"font-size:13.5px;color:#8b90a4;margin-top:8px;max-width:380px;\">This module of the NLPTrader engine is part of the product concept. The Dashboard, Live Signals, and News Feed views are fully built out.<\/div>\n        <div onclick=\"{{ goDashboard }}\" style=\"margin-top:22px;padding:11px 22px;border-radius:11px;background:{{ accent }};color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;\">Back to Dashboard<\/div>\n      <\/div>\n      <\/sc-if>\n\n    <\/div>\n      <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;inset:0;background:rgba(5,7,12,0.62);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;\">\n        <div style=\"background:#12141d;border:1px solid rgba(255,255,255,0.1);border-radius:18px;max-width:520px;width:100%;max-height:82vh;overflow:auto;padding:22px 24px;box-shadow:0 24px 60px rgba(0,0,0,0.55);\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n            <div style=\"font-size:22px;font-weight:800;letter-spacing:-0.02em;\">{{ modal.ticker }}<\/div>\n            <div style=\"display:flex;align-items:center;gap:10px;\">\n              <span style=\"padding:5px 12px;border-radius:7px;font-size:12px;font-weight:700;color:{{ modal.dirColor }};border:1px solid {{ modal.dirColor }};\">{{ modal.dir }} &middot; {{ modal.conf }}%<\/span>\n              <span onclick=\"{{ closeModal }}\" style=\"cursor:pointer;color:#8b90a4;font-size:20px;line-height:1;padding:2px 6px;\">&times;<\/span>\n            <\/div>\n          <\/div>\n          <div style=\"font-size:12px;color:#8b90a4;margin:4px 0 16px;\">Why this signal &mdash; grounded in recent headlines<\/div>\n          <sc-if value=\"{{ modal.loading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;color:#8b90a4;padding:8px 0 14px;\">Loading explanation&hellip;<\/div>\n          <\/sc-if>\n          <sc-if value=\"{{ modal.hasBullets }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:18px;\">\n            <sc-for list=\"{{ modal.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:9px;align-items:flex-start;font-size:14px;line-height:1.4;\">\n                <span style=\"font-weight:800;color:{{ b.color }};\">{{ b.mark }}<\/span>\n                <span style=\"color:#dfe4ee;\">{{ b.text }}<\/span>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n          <\/sc-if>\n          <sc-if value=\"{{ modal.hasArticles }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;color:#565c72;margin-bottom:9px;\">TOP SUPPORTING ARTICLES<\/div>\n          <sc-for list=\"{{ modal.articles }}\" as=\"a\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ a.onClick }}\" style=\"cursor:pointer;padding:11px 13px;border:1px solid rgba(255,255,255,0.07);border-radius:11px;margin-bottom:8px;\" style-hover=\"background:#171a26;\">\n              <div style=\"font-size:13.5px;font-weight:600;color:#eef1f6;line-height:1.35;\">{{ a.headline }}<\/div>\n              <div style=\"display:flex;justify-content:space-between;margin-top:5px;font-size:11.5px;color:#8b90a4;\"><span>{{ a.source }}<\/span><span>{{ a.time }} &rarr;<\/span><\/div>\n            <\/div>\n          <\/sc-for>\n          <\/sc-if>\n          <sc-if value=\"{{ modal.busy }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:#8b90a4;margin-top:8px;\">Regenerating with LLM&hellip;<\/div>\n          <\/sc-if>\n          <div style=\"display:flex;gap:10px;margin-top:14px;\">\n            <div onclick=\"{{ modal.regenerate }}\" style=\"flex:1;text-align:center;padding:10px;border-radius:11px;background:{{ modal.dirColor }};color:#0b0e14;font-size:13px;font-weight:700;cursor:pointer;\">&#8635; Regenerate<\/div>\n            <div onclick=\"{{ closeModal }}\" style=\"flex:1;text-align:center;padding:10px;border-radius:11px;background:#1a1d2a;color:#dfe4ee;font-size:13px;font-weight:600;cursor:pointer;\">Close<\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <\/sc-if>\n  <\/main>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#14b8a6&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#8b7ff5&quot;,&quot;#6366f1&quot;,&quot;#4f8ef7&quot;,&quot;#14b8a6&quot;],&quot;section&quot;:&quot;Theme&quot;},&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;live&quot;,&quot;news&quot;],&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      view: (props && props.defaultView) || 'dashboard',\n      now: new Date(),\n      lastUpdated: Date.now(),\n      spinning: false,\n      data: null,\n      selectedTicker: null,\n      detail: null,\n      detailLoading: false,\n      calendar: null,\n      calOffset: 0,\n    };\n    this.refresh = this.refresh.bind(this);\n    this.fetchData = this.fetchData.bind(this);\n    this.fetchCalendar = this.fetchCalendar.bind(this);\n    this.calPrev = this.calPrev.bind(this);\n    this.calNext = this.calNext.bind(this);\n    this.openTicker = this.openTicker.bind(this);\n    this.closeModal = this.closeModal.bind(this);\n    this.regenerate = this.regenerate.bind(this);\n  }\n\n  componentDidMount() {\n    this.clockTimer = setInterval(() => this.setState({ now: new Date() }), 1000);\n    this.updTimer = setInterval(() => this.forceUpdate(), 30000);\n    this.fetchData();\n    this.dataTimer = setInterval(() => this.fetchD lets: bullets.length > 0,\n      articles: articles, hasArticles: articles.length > 0,\n      busy: this.state.detailLoading,\n      regenerate: this.regenerate,\n    };\n  }\n\n  fetchCalendar() {\n    try {\n      fetch('/api/calendar?offset=' + this.state.calOffset).then((r) => (r.ok ? r.json() : null)).then((d) => {\n        if (d) this.setState({ calendar: d });\n      }).catch(() => {});\n    } catch (e) {}\n  }\n\n  calPrev() { this.setState({ calOffset: this.state.calOffset - 1 }, this.fetchCalendar); }\n  calNext() { this.setState({ calOffset: this.state.calOffset + 1 }, this.fetchCalendar); }\n\n  buildCalendar() {\n    const c = this.state.calendar;\n    if (!c) return { monthLabel: 'Loading\u2026', weekdays: [], days: [], prev: this.calPrev, next: this.calNext };\n    const accent = this.props.accent || '#8b7ff5';\n    const days = (c.days || []).map((d) => {\n      const events = (d.events || []).map((e) => {\n        const col = e.dir === 'BUY' ? '#34d399' : (e.dir === 'SELL' ? '#f5556d' : '#aab0c2');\n        return Object.assign({}, e, {\n          onClick: () => this.openTicker(e.ticker),\n          chipStyle: 'cursor:pointer;font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:6px;margin-bottom:3px;color:' + col + ';border:1px solid ' + col + ';background:' + col + '22;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;',\n        });\n      });\n      const cellStyle = 'min-height:86px;padding:7px 8px;border-radius:10px;background:#12141d;overflow:hidden;opacity:' + (d.inMonth ? '1' : '0.4') + ';border:1px solid ' + (d.isToday ? accent : 'rgba(255,255,255,0.06)') + ';';\n      return Object.assign({}, d, { events: events, cellStyle: cellStyle });\n    });\n    return { monthLabel: c.monthLabel, weekdays: c.weekdays, days: days, prev: this.calPrev, next: this.calNext };\n  }\n  componentWillUnmount() {\n    clearInterval(this.clockTimer);\n    clearInterval(this.updTimer);\n    clearInterval(this.dataTimer);\n    clearTimeout(this.
